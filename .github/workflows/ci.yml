name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system audio libraries
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libportaudio2 libsndfile1

      - name: Install package (with dev extras, no UI/audio runtime deps)
        run: |
          python -m pip install --upgrade pip
          # Install only headless deps that the test suite needs.
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Run tests
        run: pytest -q
